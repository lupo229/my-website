<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<title>AI dự đoán giao thông</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

#top{
text-align:center;
padding:20px;
background:white;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

#map{
height:500px;
}

#result{
background:white;
padding:20px;
}

button{
padding:10px 20px;
background:#3498db;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="top">

<h2>AI dự đoán giao thông</h2>

<input id="duong" placeholder="Nhập tên đường">
<button onclick="duDoan()">Dự đoán</button>

</div>

<div id="map"></div>

<div id="result">

<h3>Kết quả AI</h3>

<p id="ketqua"></p>
<p id="giaiphap"></p>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([21.0285,105.8542],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'Map data © OpenStreetMap'
}).addTo(map);

var marker;

function duDoan(){

var duong=document.getElementById("duong").value;

var mucdo=Math.floor(Math.random()*3);

var ketqua="";
var giaiphap="";

if(mucdo==0){
ketqua="🚗 Giao thông thông thoáng";
giaiphap="Bạn có thể đi xe cá nhân bình thường.";
}

if(mucdo==1){
ketqua="⚠️ Bắt đầu đông xe";
giaiphap="Cá nhân: đi sớm hơn 10 phút. Cộng đồng: điều chỉnh đèn giao thông.";
}

if(mucdo==2){
ketqua="🚨 Nguy cơ tắc đường cao";
giaiphap="Cá nhân: đi đường vòng hoặc dùng xe buýt. Cộng đồng: phân luồng giao thông.";
}

document.getElementById("ketqua").innerHTML="Tình trạng tại "+duong+" : "+ketqua;

document.getElementById("giaiphap").innerHTML=giaiphap;

var lat=21.0285+(Math.random()-0.5)/50;
var lng=105.8542+(Math.random()-0.5)/50;

if(marker){
map.removeLayer(marker);
}

marker=L.marker([lat,lng]).addTo(map);

map.setView([lat,lng],15);

}

</script>

</body>
</html>
